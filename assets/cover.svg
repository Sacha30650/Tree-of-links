<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#fff2dc" />
      <stop offset="55%" stop-color="#f3c98f" />
      <stop offset="100%" stop-color="#c98a4a" />
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- door light glow -->
  <rect x="540" y="180" width="180" height="320" rx="12" fill="#fff7e0" opacity=".75" />
  <rect x="555" y="195" width="150" height="290" rx="8" fill="#f9d68a" opacity=".7" />

  <!-- sparkles -->
  <g fill="#fff" opacity=".9">
    <circle cx="200" cy="160" r="3" />
    <circle cx="280" cy="220" r="2" />
    <circle cx="950" cy="180" r="3" />
    <circle cx="1020" cy="260" r="2" />
    <circle cx="180" cy="380" r="2" />
    <circle cx="1040" cy="430" r="3" />
  </g>

  <!-- Title -->
  <text x="600" y="120" text-anchor="middle" font-family="Georgia, serif"
    font-size="68" font-weight="700" fill="#3a2814">Lila et la clé du grenier</text>
  <text x="600" y="165" text-anchor="middle" font-family="Georgia, serif"
    font-size="26" font-style="italic" fill="#5b4126">Une aventure à travers cinq mondes</text>

  <!-- Bottom info -->
  <text x="600" y="555" text-anchor="middle" font-family="Helvetica, sans-serif"
    font-size="22" fill="#3a2814" font-weight="600" letter-spacing="2">APOLLINE VERGER · HISTOIREDUDODO</text>
  <text x="600" y="590" text-anchor="middle" font-family="Helvetica, sans-serif"
    font-size="20" fill="#5b4126">Pour les rêveurs de 6 à 8 ans ✨ Disponible sur Amazon</text>
</svg>
